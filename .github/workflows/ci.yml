name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-hygiene:
    name: Repository hygiene checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repository hygiene checks
        run: python3 scripts/check_repo_hygiene.py --all-refs

  ghdl-regression:
    name: GHDL self-checking testbenches
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GHDL
        run: |
          sudo apt-get update
          sudo apt-get install -y ghdl
          ghdl --version

      - name: Install Python model dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run Python fixed-point model tests
        run: python3 scripts/run_python_model_tests.py

      - name: Verify committed JS golden vectors match the model
        run: python3 scripts/gen_js_golden_vectors.py --check

      - name: Run VHDL self-checking testbenches
        run: python3 scripts/run_ghdl_tests.py

      - name: Verify generated outputs stayed under build
        run: python3 scripts/check_repo_hygiene.py --no-history

  js-model-port:
    name: JavaScript port golden-vector check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Reproduce the Python/fxpmath model bit-for-bit in JavaScript
        run: node --test js/test/golden.test.mjs
